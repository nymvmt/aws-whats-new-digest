name: AWS Digest

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore history
        uses: actions/cache/restore@v4
        with:
          path: data/history.json
          key: aws-digest-history-${{ github.run_id }}
          restore-keys: |
            aws-digest-history-

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install feedparser python-dotenv requests certifi

      - run: python digest.py
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

      - name: Save history
        uses: actions/cache/save@v4
        with:
          path: data/history.json
          key: aws-digest-history-${{ github.run_id }}
